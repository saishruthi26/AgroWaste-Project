<!DOCTYPE html>
<html>
<head>
<title>Fertilizer Distribution</title>

<style>

body{
background:#f3e5f5;
font-family:Arial;
}

.container{
width:420px;
margin:90px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

h2{
text-align:center;
color:#6a1b9a;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid gray;
}

button{
width:100%;
padding:10px;
background:#8e24aa;
color:white;
border:none;
border-radius:5px;
}

</style>
</head>

<body>

<div class="container">

<h2>Fertilizer Distribution</h2>

<form action="distribution.jsp" method="post">

<input type="text" name="farmer" placeholder="Farmer Name">

<input type="text" name="fertilizer_type" placeholder="Fertilizer Type">

<input type="number" name="quantity" placeholder="Quantity">

<input type="date" name="date">

<button type="submit">Distribute</button>

</form>

</div>

</body>
</html>
