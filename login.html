<!DOCTYPE html>
<html>
<head>
<title>AgroWaste Login</title>

<style>

body{
background:linear-gradient(120deg,#66bb6a,#aed581);
font-family:Arial;
}

.login{
width:350px;
margin:120px auto;
background:white;
padding:25px;
border-radius:8px;
box-shadow:0px 0px 10px gray;
}

h2{
text-align:center;
color:#2e7d32;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid gray;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#43a047;
color:white;
border:none;
border-radius:5px;
}

button:hover{
background:#1b5e20;
}

</style>
</head>

<body>

<div class="login">

<h2>AgroWaste Login</h2>

<form action="login.jsp" method="post">

<input type="email" name="email" placeholder="Enter Email">

<input type="password" name="password" placeholder="Enter Password">

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
