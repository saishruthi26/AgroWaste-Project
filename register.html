<!DOCTYPE html>
<html>
<head>
<title>AgroWaste Registration</title>
<style>
body{
    font-family: Arial;
    background: linear-gradient(120deg,#4CAF50,#8BC34A);
}

.container{
    width:400px;
    margin:100px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 10px gray;
}

h2{
    text-align:center;
    color:#4CAF50;
}

input,select{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:5px;
    border:1px solid gray;
}

button{
    width:100%;
    padding:10px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
}

button:hover{
    background:#2e7d32;
}
</style>
</head>

<body>

<div class="container">
<h2>User Registration</h2>

<form action="register.jsp" method="post">

<input type="text" name="name" placeholder="Enter Name" required>

<input type="email" name="email" placeholder="Enter Email" required>

<input type="text" name="phone" placeholder="Enter Phone">

<input type="password" name="password" placeholder="Enter Password">

<select name="role">
<option>Farmer</option>
<option>Admin</option>
</select>

<button type="submit">Register</button>

</form>
</div>

</body>
</html>
