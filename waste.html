<!DOCTYPE html>
<html>
<head>

<title>Waste Submission</title>

<style>

body{
background:#f1f8e9;
font-family:Arial;
}

.formbox{
width:450px;
margin:80px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

h2{
text-align:center;
color:#33691e;
}

input,select,textarea{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid gray;
}

button{
width:100%;
padding:10px;
background:#558b2f;
color:white;
border:none;
border-radius:5px;
}

</style>
</head>

<body>

<div class="formbox">

<h2>Submit Agro Waste</h2>

<form action="waste.jsp" method="post">

<input type="text" name="farmer" placeholder="Farmer Name">

<select name="type">
<option>Crop Waste</option>
<option>Vegetable Waste</option>
<option>Animal Waste</option>
</select>

<input type="number" name="quantity" placeholder="Quantity (kg)">

<textarea name="description" placeholder="Waste Description"></textarea>

<button type="submit">Submit Waste</button>

</form>

</div>

</body>
</html>
