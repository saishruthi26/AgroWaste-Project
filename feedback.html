<!DOCTYPE html>
<html>
<head>
<title>Feedback</title>

<style>

body{
background:#fffde7;
font-family:Arial;
}

.box{
width:420px;
margin:90px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

h2{
text-align:center;
color:#f57f17;
}

input,textarea{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid gray;
}

button{
width:100%;
padding:10px;
background:#fbc02d;
border:none;
border-radius:5px;
}

</style>
</head>

<body>

<div class="box">

<h2>Feedback</h2>

<form action="feedback.jsp" method="post">

<input type="text" name="name" placeholder="Your Name">

<input type="email" name="email" placeholder="Email">

<textarea name="message" placeholder="Your Feedback"></textarea>

<button type="submit">Submit Feedback</button>

</form>

</div>

</body>
</html>
